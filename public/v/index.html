<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Undangan...</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: #fd366e;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p { opacity: 0.7; font-size: 0.9rem; letter-spacing: 1px; }
    </style>
</head>
<body>
    <span class="loader"></span>
    <p id="msg">Menghubungkan ke Lumina Cloud...</p>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        // NOTE: In a real production build, these should be environment variables 
        // or fetched from a safe config endpoint.
        const SUPABASE_URL = 'https://ukukysrggeohgwhjovpq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrdWt5c3JnZ2VvaGd3aGpvdnBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MjQ3NTEsImV4cCI6MjA5MzQwMDc1MX0.TDP627Rwl3Ir1Rx01Nul1cyMHNn8z_JvkI0Qb2Qiu-M'; 

        async function resolveSlug() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('s');
            const id = params.get('id');

            if (!slug && !id) {
                document.getElementById('msg').textContent = 'Error: Slug atau ID tidak ditemukan.';
                return;
            }

            try {
                const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                document.getElementById('msg').textContent = `Mencari undangan...`;
                
                let query = supabase.from('invitations').select('*');
                if (slug) {
                    query = query.eq('slug', slug);
                } else {
                    query = query.eq('id', id);
                }

                const { data, error } = await query.single();

                if (error || !data) {
                    document.getElementById('msg').textContent = 'Undangan tidak ditemukan atau link sudah kadaluarsa.';
                    return;
                }

                // Construct the template URL with all parameters
                // We use the data.url which already contains all params generated by the dashboard
                let targetUrl = data.url;

                // Create URL object from targetUrl
                const urlObj = new URL(targetUrl);
                
                // CRITICAL FIX: Force the host and protocol to match the current live domain
                // This ensures if the invitation was saved on localhost, it still works on Vercel
                urlObj.hostname = window.location.hostname;
                urlObj.port = window.location.port;
                urlObj.protocol = window.location.protocol;

                // Ensure invId, surl, and skey are present for RSVP tracking
                urlObj.searchParams.set('invId', data.id);
                urlObj.searchParams.set('surl', SUPABASE_URL);
                urlObj.searchParams.set('skey', SUPABASE_ANON_KEY);
                
                // Forward original parameters (like guest)
                for (const [key, value] of params.entries()) {
                    if (key !== 's') {
                        urlObj.searchParams.set(key, value);
                    }
                }
                
                document.getElementById('msg').textContent = 'Mempersiapkan undangan Anda...';
                
                // Redirect to the template
                window.location.href = urlObj.toString();

            } catch (err) {
                console.error(err);
                document.getElementById('msg').textContent = 'Terjadi kesalahan sistem.';
            }
        }

        resolveSlug();
    </script>
</body>
</html>
